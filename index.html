<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>変態世界逃亡記 〜たまの世界制覇〜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Shippori+Mincho+B1:wght@400;700;800&display=swap');

:root{
  --void:#05080f;
  --deep:#090d18;
  --mid:#0f1525;
  --surface:#151d30;
  --border:rgba(80,140,220,0.18);
  --accent:#4a8cff;
  --accent2:#a0c8ff;
  --hot:#ff6a3d;
  --gold:#f0c040;
  --green:#40d080;
  --text:#d8e8ff;
  --muted:#4a5a7a;
  --danger:#ff3a3a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--void);
  font-family:'Noto Sans JP',sans-serif;
  height:100vh;
  overflow:hidden;
  color:var(--text);
}

/* ── GLOBAL SCANLINE ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,10,30,0.12) 2px,rgba(0,10,30,0.12) 4px
  );
  pointer-events:none;
  z-index:900;
}

/* ══════════════════════
   TITLE
══════════════════════ */
#title{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,#0a1535 0%,var(--void) 100%);
  cursor:pointer;
  overflow:hidden;
  z-index:500;
}
/* Star field */
#title canvas{position:absolute;inset:0;pointer-events:none;}

.t-series{
  font-size:.65rem;letter-spacing:.5em;color:var(--muted);
  margin-bottom:.6rem;
  border:1px solid var(--muted);
  padding:.25rem .8rem;
  border-radius:2px;
}
.t-globe{font-size:5rem;margin-bottom:.5rem;animation:globeSpin 6s linear infinite;}
@keyframes globeSpin{0%{filter:hue-rotate(0deg) drop-shadow(0 0 20px #4a8cff66);}100%{filter:hue-rotate(360deg) drop-shadow(0 0 20px #4a8cff66);}}
.t-main{
  font-family:'Shippori Mincho B1',serif;
  font-size:clamp(1.8rem,4.5vw,3.2rem);
  font-weight:800;
  color:var(--accent2);
  text-shadow:0 0 40px rgba(74,140,255,.6),0 0 80px rgba(74,140,255,.3);
  text-align:center;line-height:1.35;
  margin-bottom:.4rem;
}
.t-sub{font-size:.8rem;color:var(--muted);letter-spacing:.35em;margin-bottom:.5rem;}
.t-history{
  font-size:.7rem;color:#2a3a5a;
  padding:.4rem 1.2rem;
  border:1px solid #1a2a40;
  margin-bottom:2rem;letter-spacing:.08em;
}
.t-click{font-size:.8rem;color:var(--muted);letter-spacing:.25em;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:.1;}}

/* Route map decorative */
.world-line{
  position:absolute;
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,140,255,.3),transparent);
  top:55%;
  animation:scan 3s ease-in-out infinite;
}
@keyframes scan{0%,100%{opacity:.3;transform:scaleX(.8);}50%{opacity:1;transform:scaleX(1);}}

/* ══════════════════════
   GAME SHELL
══════════════════════ */
#game{
  display:none;
  height:100vh;
  flex-direction:column;
}

/* ── HUD TOP ── */
#hud{
  display:flex;align-items:center;
  gap:.8rem;
  padding:.4rem 1rem;
  background:rgba(5,8,15,.95);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:20;
  flex-wrap:wrap;
}
.hud-logo{
  font-family:'Shippori Mincho B1',serif;
  font-size:.85rem;color:var(--muted);
  letter-spacing:.1em;flex:none;
}
.hud-loc{
  font-size:.72rem;color:var(--accent);
  background:rgba(74,140,255,.1);
  border:1px solid rgba(74,140,255,.25);
  padding:.18rem .6rem;border-radius:2px;
  letter-spacing:.05em;
  transition:all .4s;
}
.hud-chapter{
  font-size:.7rem;color:var(--gold);
  margin-left:auto;
  letter-spacing:.1em;
}
.stat-group{display:flex;gap:.6rem;align-items:center;}
.stt{display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:var(--muted);}
.sbar{width:50px;height:5px;background:#0a0f1e;border-radius:3px;overflow:hidden;}
.sfill{height:100%;border-radius:3px;transition:width .5s;}
.sfill.s1{background:linear-gradient(90deg,#cc2200,#ff5500);}
.sfill.s2{background:linear-gradient(90deg,#004488,#0088ff);}
.sfill.s3{background:linear-gradient(90deg,#886600,#ffcc00);}
.sfill.s4{background:linear-gradient(90deg,#006622,#00cc44);}
#snd{
  background:none;border:1px solid var(--border);color:var(--muted);
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-none;
}
#snd:hover{border-color:var(--accent);color:var(--accent);}

/* ── SCENE ── */
#scene{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#bg{position:absolute;inset:0;transition:background .7s,opacity .5s;}
#bg-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(5,8,15,.8) 100%);
  pointer-events:none;z-index:1;
}

/* Location watermark */
#loc-stamp{
  position:absolute;bottom:38%;right:1.5rem;
  font-size:.6rem;letter-spacing:.3em;color:rgba(74,140,255,.3);
  transform:rotate(90deg);transform-origin:right center;
  pointer-events:none;z-index:3;
  transition:all .5s;
}

/* Items */
.sitem{
  position:absolute;font-size:2.2rem;pointer-events:none;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.9));
  transition:all .5s;z-index:2;
}

/* Char */
#char-wrap{
  position:relative;z-index:5;text-align:center;
}
#char-em{
  font-size:clamp(5rem,11vw,8.5rem);display:block;
  transition:all .35s;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.95));
}
#char-nm{
  font-size:.65rem;color:var(--muted);
  letter-spacing:.18em;margin-top:.3rem;
}

/* New char side panel */
#npc-panel{
  position:absolute;right:1rem;top:50%;transform:translateY(-50%);
  z-index:6;
  display:flex;flex-direction:column;gap:.5rem;
  pointer-events:none;
}
.npc-card{
  background:rgba(5,8,20,.85);
  border:1px solid var(--border);
  border-radius:4px;
  padding:.5rem .7rem;
  text-align:center;
  backdrop-filter:blur(8px);
  opacity:0;transform:translateX(20px);
  transition:all .4s;
  min-width:90px;
}
.npc-card.show{opacity:1;transform:translateX(0);}
.npc-em{font-size:2rem;display:block;margin-bottom:.2rem;}
.npc-name{font-size:.6rem;color:var(--accent2);letter-spacing:.1em;}
.npc-role{font-size:.55rem;color:var(--muted);}

/* ── CHOICE OVERLAY ── */
#choice-ov{
  position:absolute;inset:0;
  display:none;align-items:center;justify-content:center;
  z-index:30;
  background:rgba(2,4,12,.7);
  backdrop-filter:blur(4px);
}
#cbox{
  display:flex;flex-direction:column;gap:.6rem;
  width:min(92%,560px);
  padding:1.4rem;
  background:rgba(8,12,24,.96);
  border:1px solid var(--border);
  border-radius:6px;
  box-shadow:0 0 60px rgba(0,0,0,.9),0 0 30px rgba(74,140,255,.05);
}
.ch-head{
  font-size:.65rem;color:var(--muted);
  letter-spacing:.35em;text-align:center;margin-bottom:.2rem;
}
.cbtn{
  background:rgba(15,21,37,.9);
  border:1px solid rgba(74,140,255,.2);
  color:#b0c8e8;
  font-family:'Noto Sans JP',sans-serif;
  font-size:.88rem;padding:.8rem 1.1rem;
  text-align:left;cursor:pointer;
  transition:all .18s;border-radius:3px;
  letter-spacing:.03em;position:relative;overflow:hidden;
}
.cbtn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(74,140,255,.12),transparent);
  transform:translateX(-100%);transition:transform .25s;
}
.cbtn:hover::after{transform:translateX(0);}
.cbtn:hover{border-color:rgba(74,140,255,.6);color:var(--accent2);transform:translateX(5px);}
.cn{color:var(--accent);font-size:.7em;font-weight:700;margin-right:.4rem;}

/* ── TEXTBOX ── */
#tbox-wrap{
  flex-shrink:0;
  background:linear-gradient(to top,rgba(5,8,15,.98),rgba(5,8,15,.94) 80%,transparent 100%);
  position:relative;z-index:10;
}
#tbox-wrap::before{
  content:'';display:block;height:2px;
  background:linear-gradient(90deg,transparent,rgba(74,140,255,.3) 30%,rgba(74,140,255,.3) 70%,transparent);
}
#tpanel{
  padding:.9rem 1.4rem 1.1rem;
  cursor:pointer;min-height:120px;
  display:flex;flex-direction:column;justify-content:flex-end;
}
#spk-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;}
#spk-ico{font-size:1.1rem;}
#spk-nm{
  font-size:.75rem;font-weight:700;
  color:var(--accent2);letter-spacing:.08em;
  padding:.15rem .6rem;
  background:rgba(74,140,255,.12);
  border-left:2px solid var(--accent);
}
#dial{
  font-size:clamp(.85rem,1.8vw,.98rem);
  color:#c8daf8;line-height:2;
  letter-spacing:.04em;min-height:1.8em;
}
.ncur{
  display:inline-block;width:6px;height:6px;
  background:var(--accent);border-radius:50%;
  margin-left:5px;vertical-align:middle;
  animation:nb .7s ease-in-out infinite;
}
@keyframes nb{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.2;transform:scale(.6);}}

/* ── CHAPTER SPLASH ── */
#splash{
  position:fixed;inset:0;
  background:rgba(2,4,12,.95);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:400;
}
.sp-deco{
  width:min(300px,70%);height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:.8rem 0;
}
.sp-em{font-size:3.5rem;margin-bottom:.4rem;}
.sp-num{font-size:.65rem;letter-spacing:.5em;color:var(--muted);}
.sp-ttl{
  font-family:'Shippori Mincho B1',serif;
  font-size:clamp(1.3rem,4vw,2.1rem);
  color:var(--accent2);
  text-align:center;
  text-shadow:0 0 30px rgba(74,140,255,.5);
}
.sp-loc{font-size:.7rem;color:var(--muted);letter-spacing:.3em;margin-top:.5rem;}

/* ── END ── */
#end{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:600;text-align:center;padding:2rem;
}
#end.bad{background:radial-gradient(ellipse at center,#1a0505 0%,#050202 100%);}
#end.good{background:radial-gradient(ellipse at center,#050f20 0%,#020508 100%);}
#end.perfect{background:radial-gradient(ellipse at center,#0a0820 0%,#020208 100%);}
.e-em{font-size:5rem;margin-bottom:.8rem;}
.e-tag{font-size:.65rem;letter-spacing:.45em;padding:.3rem 1rem;margin-bottom:.5rem;border-radius:2px;}
.bad .e-tag{color:var(--danger);border:1px solid var(--danger);}
.good .e-tag{color:var(--accent);border:1px solid var(--accent);}
.perfect .e-tag{color:var(--gold);border:1px solid var(--gold);}
.e-ttl{
  font-family:'Shippori Mincho B1',serif;
  font-size:clamp(1.5rem,4vw,2.6rem);
  margin-bottom:.8rem;
}
.bad .e-ttl{color:#ff7060;}
.good .e-ttl{color:var(--accent2);}
.perfect .e-ttl{color:var(--gold);text-shadow:0 0 30px rgba(240,192,64,.5);}
.e-desc{font-size:.88rem;color:#6a7a9a;line-height:2.1;max-width:520px;white-space:pre-line;margin-bottom:2rem;}
.e-btns{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;}
.ebtn{
  background:none;font-family:'Noto Sans JP',sans-serif;
  font-size:.85rem;padding:.7rem 2rem;cursor:pointer;
  letter-spacing:.18em;transition:all .2s;border-radius:3px;
}
.ebtn.restart{border:1px solid var(--accent);color:var(--accent);}
.ebtn.restart:hover{background:var(--accent);color:var(--void);}

/* ── FADE ── */
#fade{
  position:fixed;inset:0;background:#000;
  z-index:700;opacity:0;pointer-events:none;transition:opacity .45s;
}

/* ── ALERT ── */
#alert{
  position:fixed;inset:0;
  border:5px solid var(--danger);
  box-shadow:inset 0 0 60px rgba(255,58,58,.25);
  pointer-events:none;z-index:800;
  opacity:0;transition:opacity .1s;
}
#alert.on{opacity:1;}

/* Stars canvas for title */
</style>
</head>

<!-- ══ CHAPTER SPLASH ══ -->

<!-- ══ END ══ -->

<script>
// ── STARFIELD ──
(function(){
  const cv=document.getElementById('starfield');
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const ctx=cv.getContext('2d');
  const stars=Array.from({length:200},()=>({
    x:Math.random(),y:Math.random(),
    s:Math.random()*1.5+.3,
    sp:Math.random()*.0002+.00005
  }));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.y+=s.sp;if(s.y>1)s.y=0;
      ctx.fillStyle=`rgba(160,200,255,${Math.random()*.6+.2})`;
      ctx.beginPath();
      ctx.arc(s.x*cv.width,s.y*cv.height,s.s,0,Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

let sc,li,typing,timer,choiceOpen;
let st={dan:30,tin:40,lck:55,ali:0};
let soundOn=true, actx;

function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f=440,d=.07,v=.08,tp='sine'){
  if(!soundOn)return;
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.value=f;o.type=tp;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d);}catch(e){}
}
function pt(){beep(180+Math.random()*120,.025,.025,'triangle');}
function pclk(){beep(520,.05,.07);}
function pch(){beep(660,.09,.1);}
function pbad(){beep(140,.5,.1,'sawtooth');}
function pgood(){[523,659,784,880,1046].forEach((f,i)=>setTimeout(()=>beep(f,.25,.12),i*130));}
function pperf(){[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.3,.13),i*100));}
function toggleSound(){soundOn=!soundOn;document.getElementById('snd').textContent=soundOn?'🔊':'🔇';}

// BGM — spacey arpeggio
function startBGM(){
  if(!soundOn)return;
  const c=ac();
  const seq=[220,261,329,392,440,392,329,261];
  let t=c.currentTime+.1;
  function loop(){
    if(!soundOn)return;
    seq.forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.frequency.value=f;o.type='sine';
      const bt=t+i*.3;
      g.gain.setValueAtTime(.03,bt);
      g.gain.exponentialRampToValueAtTime(.001,bt+.25);
      o.start(bt);o.stop(bt+.3);
    });
    t+=seq.length*.3;
    setTimeout(loop,(seq.length*.3-.5)*1000);
  }
  loop();
}

function updBars(){
  document.getElementById('b1').style.width=st.dan+'%';
  document.getElementById('b2').style.width=st.tin+'%';
  document.getElementById('b3').style.width=st.lck+'%';
  document.getElementById('b4').style.width=st.ali+'%';
}

function applyStats(obj){
  if(!obj)return;
  const map={dan:'dan',stat:{},tin:'tin',lck:'lck',ali:'ali'};
  for(const[k,v]of Object.entries(obj)){
    if(st[k]!==undefined) st[k]=Math.min(100,Math.max(0,st[k]+v));
  }
  updBars();
  if(st.dan>70){
    const a=document.getElementById('alert');
    a.classList.add('on'); beep(880,.12,.15,'square');
    setTimeout(()=>a.classList.remove('on'),300);
    setTimeout(()=>{a.classList.add('on');setTimeout(()=>a.classList.remove('on'),300);},600);
  }
}

function loadScene(key){
  fade(()=>{
    sc=S[key]; li=0; choiceOpen=false;
    if(sc.type==='end'){showEnd(sc);return;}

    document.getElementById('bg').style.background=sc.bg||'#05080f';
    document.getElementById('char-em').textContent=sc.char||'😾';
    document.getElementById('char-nm').textContent=sc.cnm||'たま';
    document.getElementById('loc-stamp').textContent=sc.locStamp||'';

    // Location HUD
    if(sc.loc) document.getElementById('hud-loc').textContent=sc.loc;
    if(sc.ch) document.getElementById('hud-ch').textContent=sc.ch;

    // Items
    ['si-a','si-b','si-c'].forEach((id,idx)=>{
      document.getElementById(id).textContent=(sc.items&&sc.items[idx])||'';
    });

    // NPCs
    const panel=document.getElementById('npc-panel');
    panel.innerHTML='';
    (sc.npcs||[]).forEach(n=>{
      const d=document.createElement('div');
      d.className='npc-card';
      d.innerHTML=`<span class="npc-em">${n.em}</span><div class="npc-name">${n.nm}</div><div class="npc-role">${n.role}</div>`;
      panel.appendChild(d);
      setTimeout(()=>d.classList.add('show'),200);
    });

    document.getElementById('choice-ov').style.display='none';

    if(sc.ch&&sc.chT){
      showSplash(sc.ch,sc.chT,sc.chE||'📖',sc.loc||'',()=>showLine());
    } else {
      showLine();
    }
  });
}

function showLine(){
  if(!sc.lines||li>=sc.lines.length){
    if(sc.next){loadScene(sc.next);return;}
    showChoices();return;
  }
  const ln=sc.lines[li];
  document.getElementById('spk-ico').textContent=ln.i||'📖';
  document.getElementById('spk-nm').textContent=ln.s||'ナレーター';
  const dl=document.getElementById('dial');
  dl.innerHTML='';typing=true;
  let i=0;const txt=ln.t;
  function tick(){
    if(i<txt.length){dl.textContent=txt.slice(0,i+1);if(i%2===0)pt();i++;timer=setTimeout(tick,36);}
    else{typing=false;dl.innerHTML=txt+'<span class="ncur"></span>';}
  }
  tick();
}

function nextLine(){
  if(choiceOpen)return;
  if(typing){
    clearTimeout(timer);typing=false;
    const ln=sc.lines[li];
    document.getElementById('dial').innerHTML=ln.t+'<span class="ncur"></span>';
    return;
  }
  pclk();li++;showLine();
}

function showChoices(){
  if(!sc.choices)return;
  choiceOpen=true;
  const ov=document.getElementById('choice-ov');
  const box=document.getElementById('cbox');
  box.innerHTML='<div class="ch-head">── どうする？ ──</div>';
  ov.style.display='flex';
  sc.choices.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='cbtn';
    b.innerHTML=`<span class="cn">${i+1}.</span>${ch.t}`;
    b.onclick=()=>{
      pch();ov.style.display='none';choiceOpen=false;
      if(ch.stat)applyStats(ch.stat);
      loadScene(ch.next);
    };
    box.appendChild(b);
  });
}

function showSplash(num,ttl,em,loc,cb){
  const sp=document.getElementById('splash');
  document.getElementById('sp-em').textContent=em;
  document.getElementById('sp-num').textContent=num.split('').join(' ');
  document.getElementById('sp-ttl').textContent=ttl;
  document.getElementById('sp-loc').textContent=loc;
  sp.style.display='flex';
  beep(440,.35,.1);
  setTimeout(()=>{sp.style.display='none';if(cb)cb();},2300);
}

function showEnd(s){
  const el=document.getElementById('end');
  el.style.display='flex';
  el.className=s.ec;
  document.getElementById('e-em').textContent=s.em;
  document.getElementById('e-tag').textContent=s.tag;
  document.getElementById('e-ttl').textContent=s.ttl;
  document.getElementById('e-desc').textContent=s.desc;
  if(s.ec==='perfect')pperf();
  else if(s.ec==='good')pgood();
  else pbad();
  if(s.ec==='perfect')addStars();
}

function addStars(){
  const el=document.getElementById('end');
  ['🌟','✨','⭐','🎊','🎉','🌍'].forEach(em=>{
    for(let i=0;i<4;i++){
      const d=document.createElement('div');
      d.style.cssText=`position:absolute;font-size:1.8rem;left:${Math.random()*100}%;animation:pfloat ${2+Math.random()*2}s ease-out ${Math.random()*2}s infinite;pointer-events:none;`;
      d.textContent=em;
      el.appendChild(d);
    }
  });
  const st=document.createElement('style');
  st.textContent='@keyframes pfloat{0%{transform:translateY(100vh) rotate(0deg);opacity:1;}100%{transform:translateY(-100px) rotate(360deg);opacity:0;}}';
  document.head.appendChild(st);
}

function restartGame(){
  document.getElementById('end').style.display='none';
  document.getElementById('end').querySelectorAll('div[style]').forEach(e=>e.remove());
  st={dan:30,tin:40,lck:55,ali:0};
  updBars();
  loadScene('prologue');
}

function startGame(){
  document.getElementById('title').style.display='none';
  document.getElementById('game').style.display='flex';
  if(soundOn)startBGM();
  loadScene('prologue');
}

function fade(cb){
  const f=document.getElementById('fade');
  f.style.opacity='1';
  setTimeout(()=>{cb();setTimeout(()=>f.style.opacity='0',80);},440);
}

document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter')nextLine();});
document.getElementById('tpanel').addEventListener('click',nextLine);
</script>
</body>
</html>
